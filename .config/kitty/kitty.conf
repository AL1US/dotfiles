# ==========================================
# ШРИФТЫ И ТЕКСТ
# ==========================================
# Рекомендую поставить JetBrainsMono Nerd Font для красивых иконок
font_family      JetBrains Mono
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 12.0
disable_ligatures never

# ==========================================
# КУРСОР И МЫШЬ
# ==========================================
cursor_shape beam
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0

# Скрывать мышь, если начать печатать
mouse_hide_wait 3.0

# ==========================================
# ВНЕШНИЙ ВИД ОКНА
# ==========================================
# Отступы от краев окна (создает "воздух" и выглядит намного эстетичнее)
window_padding_width 12

# Отключаем дефолтные рамки окна (niri сам нарисует красивые тени и обводку)
hide_window_decorations yes

# Не спрашивать подтверждение при закрытии окна
confirm_os_window_close 0

# Легкая полупрозрачность фона (отлично смотрится в Wayland)
background_opacity 0.95

# ==========================================
# ПАНЕЛЬ ВКЛАДОК (TABS)
# ==========================================
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
active_tab_font_style   bold
inactive_tab_font_style normal


# ==========================================
# ЦВЕТОВАЯ СХЕМА: NORD (Холодный минимализм)
# ==========================================
foreground            #D8DEE9
background            #2E3440
selection_foreground  #2E3440
selection_background  #88C0D0
url_color             #81A1C1

# Чёрный / Серый (Полярная ночь)
color0  #3B4252
color8  #4C566A
# Красный (Полярное сияние)
color1  #BF616A
color9  #BF616A
# Зелёный
color2  #A3BE8C
color10 #A3BE8C
# Жёлтый
color3  #EBCB8B
color11 #EBCB8B
# Синий
color4  #81A1C1
color12 #81A1C1
# Пурпурный
color5  #B48EAD
color13 #B48EAD
# Бирюзовый
color6  #88C0D0
color14 #8FBCBB
# Белый (Снежная буря)
color7  #E5E9F0
color15 #ECEFF4

